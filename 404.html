<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>404 - 页面未找到</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 72px;
            margin: 0;
            color: #e74c3c;
        }
        p {
            font-size: 18px;
            margin: 10px 0;
        }
        .timer {
            font-weight: bold;
            color: #ff0000;
            font-size: 24px;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <p>抱歉，您访问的页面不存在。</p>
        <p>将在 <span id="countdown" class="timer">8</span> 秒后自动跳转至 真香定律 YouTube 频道...</p>
        <p>或者 <a href="https://www.youtube.com/@zhenxiangdinglv">点击此处立即跳转</a></p>
    </div>

    <script>
        // 设置目标 URL
        const targetUrl = "https://www.youtube.com/@zhenxiangdinglv";
        // 设置初始倒计时秒数
        let seconds = 8;
        
        const countdownElement = document.getElementById('countdown');

        // 创建定时器，每 1000 毫秒（1秒）运行一次
        const timer = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(timer); // 停止定时器
                window.location.href = targetUrl; // 执行跳转
            }
        }, 1000);
    </script>
</body>
</html>
